<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manglish Pro | Smart Notes</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Arima:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta name="google-site-verification" content="kyrKkWvxQ7AVRy-vMoH1Pt1vKvY5g14GZIIYIBAn_WM" />
    
    <style>
        :root {
            --primary: #6c63ff;
            --primary-hover: #5a52d5;
            --bg-color: #f8f9fa;
            --sidebar-bg: #ffffff;
            --editor-bg: #ffffff;
            --text-main: #2d3436;
            --text-muted: #636e72;
            --border-color: #e9ecef;
            --danger: #ff7675;
            --sidebar-width: 320px;
            --chip-bg: rgba(108, 99, 255, 0.1);
        }

        /* Dark Mode Variables */
        [data-theme="dark"] {
            --bg-color: #121212;
            --sidebar-bg: #1e1e1e;
            --editor-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-muted: #9e9e9e;
            --border-color: #333333;
            --chip-bg: rgba(108, 99, 255, 0.2);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        .app-container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* --- Sidebar Styles --- */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease, background-color 0.3s;
            z-index: 100;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            font-family: 'Arima', cursive;
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--primary);
            margin: 0;
        }

        .btn-new-note {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .btn-new-note:hover { background: var(--primary-hover); color: white; }

        .notes-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .note-item {
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 8px;
            transition: all 0.2s;
            border: 1px solid transparent;
            position: relative;
            background: transparent;
        }

        .note-item:hover { background: var(--bg-color); }
        .note-item.active {
            background: var(--chip-bg);
            border-color: rgba(108, 99, 255, 0.2);
        }

        .note-title {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-right: 24px;
            font-family: 'Arima', 'Inter', sans-serif;
        }

        .note-preview {
            font-size: 0.8rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .note-date {
            font-size: 0.7rem;
            color: var(--text-muted);
            opacity: 0.7;
            margin-top: 6px;
        }

        .btn-delete {
            position: absolute;
            top: 15px;
            right: 15px;
            color: var(--text-muted);
            background: none;
            border: none;
            padding: 0;
            opacity: 0;
            transition: opacity 0.2s, color 0.2s;
        }

        .note-item:hover .btn-delete { opacity: 1; }
        .btn-delete:hover { color: var(--danger); }

        /* --- Main Editor Styles --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--editor-bg);
            height: 100vh;
            transition: background-color 0.3s;
        }

        .editor-toolbar {
            padding: 15px 30px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .mobile-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 1.2rem;
            color: var(--text-main);
            padding: 0 10px 0 0;
        }

        .toolbar-actions { display: flex; gap: 10px; flex-wrap: wrap; }

        .btn-tool {
            background: var(--bg-color);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 8px 14px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-tool:hover { background: var(--border-color); }
        .btn-tool.active-lang { border-color: var(--primary); color: var(--primary); }

        .editor-workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 30px;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        .save-status {
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Suggestion Bar */
        .suggestion-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            min-height: 36px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .suggestion-bar::-webkit-scrollbar { display: none; }

        .suggestion-chip {
            background: var(--chip-bg);
            color: var(--text-main);
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Arima', sans-serif;
            font-size: 0.95rem;
            white-space: nowrap;
            transition: all 0.1s;
            border: 2px solid transparent;
        }

        /* Highlighted state for keyboard navigation */
        .suggestion-chip.focused {
            background: var(--primary);
            color: white;
            border-color: var(--primary-hover);
            transform: scale(1.05);
        }
        
        .suggestion-chip:hover:not(.focused) {
            background: var(--primary);
            color: white;
        }

        /* Textarea */
        .main-textarea {
            flex: 1;
            width: 100%;
            border: none;
            resize: none;
            font-size: 1.3rem;
            font-family: 'Arima', 'Inter', sans-serif;
            line-height: 1.8;
            color: var(--text-main);
            outline: none;
            padding: 0;
            background: transparent;
        }

        .main-textarea::placeholder {
            color: var(--text-muted);
            opacity: 0.5;
        }

        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                height: 100%;
                box-shadow: 5px 0 25px rgba(0,0,0,0.1);
                transform: translateX(-100%);
            }
            .sidebar.open { transform: translateX(0); }
            .mobile-toggle { display: block; }
            .editor-toolbar { padding: 15px; flex-direction: column; align-items: flex-start; gap: 10px; }
            .editor-workspace { padding: 20px 15px; }
            .toolbar-actions { width: 100%; overflow-x: auto; padding-bottom: 5px; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h1 class="brand">മംഗ്ലീഷ് Pro</h1>
            <button class="btn-new-note" onclick="createNewNote()" title="New Note">
                <i class="fas fa-plus"></i>
            </button>
        </div>
        <div class="notes-list" id="notes-list"></div>
    </aside>

    <main class="main-content">
        <header class="editor-toolbar">
            <div class="d-flex align-items-center gap-3">
                <button class="mobile-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
                <div class="save-status" id="save-status">
                    <i class="fas fa-check-circle text-success" style="display:none;" id="status-icon"></i>
                    <span id="status-text">All changes saved</span>
                </div>
            </div>
            <div class="toolbar-actions">
                <button class="btn-tool active-lang" id="lang-btn" onclick="toggleLanguage()" title="Shortcut: Ctrl/Cmd + Space">
                    <i class="fas fa-language"></i> <span id="lang-text">Malayalam ON</span>
                </button>
                <button class="btn-tool" onclick="toggleTheme()" id="theme-btn">
                    <i class="fas fa-moon"></i>
                </button>
                <button class="btn-tool" onclick="copyText()"><i class="fas fa-copy"></i> Copy</button>
                <button class="btn-tool" onclick="downloadTxt()"><i class="fas fa-download"></i> .txt</button>
            </div>
        </header>

        <div class="editor-workspace">
            <div id="suggestion-container" class="suggestion-bar"></div>
            <textarea 
                id="editor" 
                class="main-textarea" 
                placeholder="Start typing... (Ctrl+Space to toggle English/Malayalam)"
            ></textarea>
        </div>
    </main>
</div>

<script>
    // --- State Management ---
    let notes = JSON.parse(localStorage.getItem('manglish_notes')) || [];
    let activeNoteId = null;
    let saveTimeout = null;
    
    // New Feature States
    let isTransliterationEnabled = true;
    let currentSuggestions = [];
    let currentOriginalWord = "";
    let activeSuggestionIndex = -1;

    // DOM Elements
    const editor = document.getElementById('editor');
    const notesListEl = document.getElementById('notes-list');
    const suggContainer = document.getElementById('suggestion-container');
    const statusText = document.getElementById('status-text');
    const statusIcon = document.getElementById('status-icon');
    const sidebar = document.getElementById('sidebar');
    const langBtn = document.getElementById('lang-btn');
    const langText = document.getElementById('lang-text');
    const themeBtn = document.getElementById('theme-btn');

    // --- Initialization ---
    function init() {
        if (notes.length === 0) createNewNote();
        else {
            notes.sort((a, b) => b.updatedAt - a.updatedAt);
            activeNoteId = notes[0].id;
            loadActiveNote();
            renderNotesList();
        }
        
        // Load Theme
        if (localStorage.getItem('manglish_theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            themeBtn.innerHTML = '<i class="fas fa-sun"></i>';
        }
    }

    // --- New Features Logic ---

    // 1. Toggle Theme
    function toggleTheme() {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        if (isDark) {
            document.documentElement.removeAttribute('data-theme');
            localStorage.setItem('manglish_theme', 'light');
            themeBtn.innerHTML = '<i class="fas fa-moon"></i>';
        } else {
            document.documentElement.setAttribute('data-theme', 'dark');
            localStorage.setItem('manglish_theme', 'dark');
            themeBtn.innerHTML = '<i class="fas fa-sun"></i>';
        }
    }

    // 2. Toggle Language
    function toggleLanguage() {
        isTransliterationEnabled = !isTransliterationEnabled;
        if (isTransliterationEnabled) {
            langBtn.classList.add('active-lang');
            langText.innerText = "Malayalam ON";
            editor.focus();
        } else {
            langBtn.classList.remove('active-lang');
            langText.innerText = "English ON";
            clearSuggestions();
            editor.focus();
        }
    }

    function clearSuggestions() {
        currentSuggestions = [];
        currentOriginalWord = "";
        activeSuggestionIndex = -1;
        suggContainer.innerHTML = '';
    }

    // --- CRUD Operations --- (Kept exactly as before)
    function createNewNote() {
        const newNote = { id: Date.now().toString(), content: '', updatedAt: Date.now() };
        notes.unshift(newNote);
        activeNoteId = newNote.id;
        saveToLocalStorage();
        loadActiveNote();
        renderNotesList();
        editor.focus();
        if(window.innerWidth <= 768) toggleSidebar();
    }

    function loadActiveNote() {
        const note = notes.find(n => n.id === activeNoteId);
        if (note) {
            editor.value = note.content;
            clearSuggestions();
            showStatus('All changes saved', 'check-circle', 'text-success');
        }
    }

    function deleteNote(id, event) {
        event.stopPropagation();
        if(confirm("Delete this note?")) {
            notes = notes.filter(n => n.id !== id);
            saveToLocalStorage();
            if (notes.length === 0) createNewNote();
            else if (activeNoteId === id) {
                activeNoteId = notes[0].id;
                loadActiveNote();
            }
            renderNotesList();
        }
    }

    // --- Auto-Save ---
    editor.addEventListener('input', () => {
        showStatus('Saving...', 'spinner fa-spin', 'text-secondary');
        clearTimeout(saveTimeout);
        saveTimeout = setTimeout(() => {
            const note = notes.find(n => n.id === activeNoteId);
            if (note) {
                note.content = editor.value;
                note.updatedAt = Date.now();
                notes = [note, ...notes.filter(n => n.id !== activeNoteId)];
                saveToLocalStorage();
                renderNotesList();
                showStatus('Saved', 'check-circle', 'text-success');
            }
        }, 1000);
    });

    function saveToLocalStorage() { localStorage.setItem('manglish_notes', JSON.stringify(notes)); }

    function renderNotesList() {
        notesListEl.innerHTML = '';
        notes.forEach(note => {
            let title = note.content.trim() ? note.content.trim().split('\n')[0].substring(0, 30) : 'New Note';
            let preview = note.content.trim().substring(0, 50).replace(/\n/g, ' ');
            const dateStr = new Date(note.updatedAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });

            const noteEl = document.createElement('div');
            noteEl.className = `note-item ${note.id === activeNoteId ? 'active' : ''}`;
            noteEl.onclick = () => {
                activeNoteId = note.id;
                loadActiveNote();
                renderNotesList();
                if(window.innerWidth <= 768) toggleSidebar();
            };

            noteEl.innerHTML = `
                <div class="note-title">${title}</div>
                <div class="note-preview">${preview || 'Empty...'}</div>
                <div class="note-date">${dateStr}</div>
                <button class="btn-delete" onclick="deleteNote('${note.id}', event)"><i class="fas fa-trash"></i></button>
            `;
            notesListEl.appendChild(noteEl);
        });
    }

    function showStatus(text, iconClass, colorClass) {
        statusText.innerText = text;
        statusIcon.className = `fas fa-${iconClass} ${colorClass}`;
        statusIcon.style.display = 'inline-block';
    }

    function toggleSidebar() { sidebar.classList.toggle('open'); }

    // --- Transliteration Engine & Keyboard Nav ---
    async function fetchTransliteration(text) {
        if (!text.trim()) return [];
        try {
            const url = `https://inputtools.google.com/request?text=${encodeURIComponent(text)}&itc=ml-t-i0-und&num=6&cp=0&cs=1&ie=utf-8&oe=utf-8`;
            const res = await fetch(url);
            const data = await res.json();
            return data[0] === "SUCCESS" ? data[1][0][1] : [];
        } catch (e) { return []; }
    }

    // Live Suggestions
    editor.addEventListener('input', async (e) => {
        if (!isTransliterationEnabled) return;

        const text = editor.value;
        const cursorPos = editor.selectionStart;
        const textBefore = text.substring(0, cursorPos);
        const words = textBefore.split(/[\s\n]/);
        const wordToProcess = words[words.length - 1];

        if (wordToProcess.length > 0 && !/[\u0D00-\u0D7F]/.test(wordToProcess)) {
            const suggestions = await fetchTransliteration(wordToProcess);
            currentSuggestions = suggestions;
            currentOriginalWord = wordToProcess;
            activeSuggestionIndex = suggestions.length > 0 ? 0 : -1; // Auto-focus first
            renderSuggestions(suggestions);
        } else {
            clearSuggestions();
        }
    });

    function renderSuggestions(list) {
        suggContainer.innerHTML = '';
        if (list.length === 0) return;
        
        list.forEach((word, index) => {
            const chip = document.createElement('span');
            chip.className = `suggestion-chip ${index === activeSuggestionIndex ? 'focused' : ''}`;
            chip.innerText = word;
            
            // Allow manual click
            chip.onclick = () => applySuggestion(word, currentOriginalWord);
            
            // Hover safely overrides focus visually if needed
            chip.onmouseenter = () => {
                activeSuggestionIndex = index;
                renderSuggestions(currentSuggestions);
            };
            
            suggContainer.appendChild(chip);
        });
    }

    function applySuggestion(replacement, original) {
        const text = editor.value;
        const cursorPos = editor.selectionStart;
        const start = text.lastIndexOf(original, cursorPos);
        
        if (start !== -1) {
            const newText = text.substring(0, start) + replacement + " " + text.substring(cursorPos);
            editor.value = newText;
            editor.focus();
            const newPos = start + replacement.length + 1;
            editor.setSelectionRange(newPos, newPos);
            clearSuggestions();
            editor.dispatchEvent(new Event('input')); // Trigger save
        }
    }

    // Keyboard Interception
    editor.addEventListener('keydown', (e) => {
        // Toggle shortcut (Ctrl+Space or Cmd+Space)
        if ((e.ctrlKey || e.metaKey) && e.code === 'Space') {
            e.preventDefault();
            toggleLanguage();
            return;
        }

        if (!isTransliterationEnabled) return;

        // Suggestion Navigation
        if (currentSuggestions.length > 0) {
            if (e.code === 'ArrowRight' || e.code === 'ArrowDown') {
                e.preventDefault(); // Stop cursor moving
                if (activeSuggestionIndex < currentSuggestions.length - 1) {
                    activeSuggestionIndex++;
                    renderSuggestions(currentSuggestions);
                }
                return;
            }
            
            if (e.code === 'ArrowLeft' || e.code === 'ArrowUp') {
                e.preventDefault();
                if (activeSuggestionIndex > 0) {
                    activeSuggestionIndex--;
                    renderSuggestions(currentSuggestions);
                }
                return;
            }

            if (e.code === 'Escape') {
                e.preventDefault();
                clearSuggestions(); // Dismiss and return cursor control
                return;
            }

            if (e.code === 'Space' || e.code === 'Enter') {
                e.preventDefault();
                const wordToApply = activeSuggestionIndex >= 0 ? currentSuggestions[activeSuggestionIndex] : currentSuggestions[0];
                applySuggestion(wordToApply, currentOriginalWord);
                
                // Add a newline if Enter was pressed
                if (e.code === 'Enter') {
                    const pos = editor.selectionStart;
                    editor.value = editor.value.substring(0, pos) + '\n' + editor.value.substring(pos);
                    editor.selectionStart = editor.selectionEnd = pos + 1;
                }
                return;
            }
        }
    });

    // --- Tools ---
    function copyText() {
        if (!editor.value.trim()) return;
        editor.select();
        document.execCommand('copy');
        showStatus('Copied!', 'check-double', 'text-primary');
        setTimeout(() => showStatus('All changes saved', 'check-circle', 'text-success'), 2000);
    }

    function downloadTxt() {
        if (!editor.value.trim()) return;
        const element = document.createElement('a');
        const file = new Blob([editor.value], {type: 'text/plain'});
        element.href = URL.createObjectURL(file);
        const note = notes.find(n => n.id === activeNoteId);
        const filename = (note.content.trim().split('\n')[0].substring(0, 15) || 'manglish_note').replace(/[^a-z0-9]/gi, '_').toLowerCase();
        element.download = `${filename}.txt`;
        document.body.appendChild(element);
        element.click();
        document.body.removeChild(element);
    }

    init();
</script>

</body>
</html>
