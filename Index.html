<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manglish Pro | Smart Notes</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Arima:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #6c63ff;
            --primary-hover: #5a52d5;
            --bg-color: #f8f9fa;
            --sidebar-bg: #ffffff;
            --editor-bg: #ffffff;
            --text-main: #2d3436;
            --text-muted: #636e72;
            --border-color: #e9ecef;
            --danger: #ff7675;
            --sidebar-width: 320px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden; /* Prevent body scroll, let panels scroll */
        }

        .app-container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* --- Sidebar Styles --- */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            z-index: 100;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            font-family: 'Arima', cursive;
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--primary);
            margin: 0;
        }

        .btn-new-note {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .btn-new-note:hover { background: var(--primary-hover); color: white; }

        .notes-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .note-item {
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 8px;
            transition: all 0.2s;
            border: 1px solid transparent;
            position: relative;
            background: #fff;
        }

        .note-item:hover {
            background: var(--bg-color);
        }

        .note-item.active {
            background: rgba(108, 99, 255, 0.08);
            border-color: rgba(108, 99, 255, 0.2);
        }

        .note-title {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-right: 24px; /* Space for delete button */
            font-family: 'Arima', 'Inter', sans-serif;
        }

        .note-preview {
            font-size: 0.8rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .note-date {
            font-size: 0.7rem;
            color: #b2bec3;
            margin-top: 6px;
        }

        .btn-delete {
            position: absolute;
            top: 15px;
            right: 15px;
            color: var(--text-muted);
            background: none;
            border: none;
            padding: 0;
            opacity: 0;
            transition: opacity 0.2s, color 0.2s;
        }

        .note-item:hover .btn-delete { opacity: 1; }
        .btn-delete:hover { color: var(--danger); }

        /* --- Main Editor Styles --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--editor-bg);
            height: 100vh;
        }

        .editor-toolbar {
            padding: 15px 30px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .mobile-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 1.2rem;
            color: var(--text-main);
            padding: 0 10px 0 0;
        }

        .toolbar-actions {
            display: flex;
            gap: 10px;
        }

        .btn-tool {
            background: var(--bg-color);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 8px 16px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-tool:hover { background: #e2e6ea; }
        .btn-tool i { margin-right: 6px; }

        .editor-workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 30px;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        .save-status {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Suggestion Bar */
        .suggestion-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            min-height: 36px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .suggestion-bar::-webkit-scrollbar { display: none; }

        .suggestion-chip {
            background: rgba(108, 99, 255, 0.1);
            color: var(--primary);
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Arima', sans-serif;
            font-size: 0.95rem;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .suggestion-chip:hover { background: var(--primary); color: white; }

        /* Textarea */
        .main-textarea {
            flex: 1;
            width: 100%;
            border: none;
            resize: none;
            font-size: 1.3rem;
            font-family: 'Arima', 'Inter', sans-serif;
            line-height: 1.8;
            color: var(--text-main);
            outline: none;
            padding: 0;
            background: transparent;
        }

        .main-textarea::placeholder {
            color: #b2bec3;
            font-family: 'Inter', sans-serif;
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                height: 100%;
                box-shadow: 5px 0 25px rgba(0,0,0,0.1);
                transform: translateX(-100%);
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .mobile-toggle { display: block; }
            .editor-toolbar { padding: 15px; }
            .editor-workspace { padding: 20px 15px; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h1 class="brand">മംഗ്ലീഷ് Pro</h1>
            <button class="btn-new-note" onclick="createNewNote()" title="New Note">
                <i class="fas fa-plus"></i>
            </button>
        </div>
        <div class="notes-list" id="notes-list">
            </div>
    </aside>

    <main class="main-content">
        <header class="editor-toolbar">
            <div class="d-flex align-items-center">
                <button class="mobile-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
                <div class="save-status" id="save-status">
                    <i class="fas fa-check-circle text-success" style="display:none;" id="status-icon"></i>
                    <span id="status-text">All changes saved</span>
                </div>
            </div>
            <div class="toolbar-actions">
                <button class="btn-tool" onclick="copyText()"><i class="fas fa-copy"></i> Copy</button>
                <button class="btn-tool" onclick="downloadTxt()"><i class="fas fa-download"></i> Save .txt</button>
            </div>
        </header>

        <div class="editor-workspace">
            <div id="suggestion-container" class="suggestion-bar"></div>
            <textarea 
                id="editor" 
                class="main-textarea" 
                placeholder="Start typing your thoughts here... (Press space to convert to Malayalam)"
            ></textarea>
        </div>
    </main>
</div>

<script>
    // --- State Management ---
    let notes = JSON.parse(localStorage.getItem('manglish_notes')) || [];
    let activeNoteId = null;
    let saveTimeout = null;

    // DOM Elements
    const editor = document.getElementById('editor');
    const notesListEl = document.getElementById('notes-list');
    const suggContainer = document.getElementById('suggestion-container');
    const statusText = document.getElementById('status-text');
    const statusIcon = document.getElementById('status-icon');
    const sidebar = document.getElementById('sidebar');

    // --- Initialization ---
    function init() {
        if (notes.length === 0) {
            createNewNote();
        } else {
            // Sort by latest updated
            notes.sort((a, b) => b.updatedAt - a.updatedAt);
            activeNoteId = notes[0].id;
            loadActiveNote();
            renderNotesList();
        }
    }

    // --- CRUD Operations ---
    function createNewNote() {
        const newNote = {
            id: Date.now().toString(),
            content: '',
            updatedAt: Date.now()
        };
        notes.unshift(newNote); // Add to top
        activeNoteId = newNote.id;
        saveToLocalStorage();
        loadActiveNote();
        renderNotesList();
        editor.focus();
        
        if(window.innerWidth <= 768) toggleSidebar(); // Close sidebar on mobile
    }

    function loadActiveNote() {
        const note = notes.find(n => n.id === activeNoteId);
        if (note) {
            editor.value = note.content;
            suggContainer.innerHTML = '';
            showStatus('All changes saved', 'check-circle', 'text-success');
        }
    }

    function deleteNote(id, event) {
        event.stopPropagation(); // Prevent opening the note when clicking delete
        if(confirm("Are you sure you want to delete this note?")) {
            notes = notes.filter(n => n.id !== id);
            saveToLocalStorage();
            
            if (notes.length === 0) {
                createNewNote();
            } else if (activeNoteId === id) {
                activeNoteId = notes[0].id;
                loadActiveNote();
            }
            renderNotesList();
        }
    }

    // --- Auto-Save Logic ---
    editor.addEventListener('input', () => {
        showStatus('Saving...', 'spinner fa-spin', 'text-secondary');
        
        // Debounce saving to prevent performance hits
        clearTimeout(saveTimeout);
        saveTimeout = setTimeout(() => {
            const note = notes.find(n => n.id === activeNoteId);
            if (note) {
                note.content = editor.value;
                note.updatedAt = Date.now();
                // Move updated note to top
                notes = [note, ...notes.filter(n => n.id !== activeNoteId)];
                saveToLocalStorage();
                renderNotesList();
                showStatus('Saved', 'check-circle', 'text-success');
            }
        }, 1000); // Save 1 second after typing stops
    });

    function saveToLocalStorage() {
        localStorage.setItem('manglish_notes', JSON.stringify(notes));
    }

    // --- UI Rendering ---
    function renderNotesList() {
        notesListEl.innerHTML = '';
        notes.forEach(note => {
            // Extract Title from content (first 3 words or 25 chars)
            let title = note.content.trim() ? note.content.trim().split('\n')[0].substring(0, 30) : 'New Note';
            let preview = note.content.trim().substring(0, 50).replace(/\n/g, ' ');
            
            // Format Date
            const dateObj = new Date(note.updatedAt);
            const dateStr = dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });

            const noteEl = document.createElement('div');
            noteEl.className = `note-item ${note.id === activeNoteId ? 'active' : ''}`;
            noteEl.onclick = () => {
                activeNoteId = note.id;
                loadActiveNote();
                renderNotesList();
                if(window.innerWidth <= 768) toggleSidebar();
            };

            noteEl.innerHTML = `
                <div class="note-title">${title}</div>
                <div class="note-preview">${preview || 'Empty...'}</div>
                <div class="note-date">${dateStr}</div>
                <button class="btn-delete" onclick="deleteNote('${note.id}', event)" title="Delete Note">
                    <i class="fas fa-trash"></i>
                </button>
            `;
            notesListEl.appendChild(noteEl);
        });
    }

    function showStatus(text, iconClass, colorClass) {
        statusText.innerText = text;
        statusIcon.className = `fas fa-${iconClass} ${colorClass}`;
        statusIcon.style.display = 'inline-block';
    }

    function toggleSidebar() {
        sidebar.classList.toggle('open');
    }

    // --- Core Transliteration Engine (Retained & Optimized) ---
    async function fetchTransliteration(text) {
        if (!text.trim()) return [];
        try {
            const url = `https://inputtools.google.com/request?text=${encodeURIComponent(text)}&itc=ml-t-i0-und&num=6&cp=0&cs=1&ie=utf-8&oe=utf-8`;
            const res = await fetch(url);
            const data = await res.json();
            return data[0] === "SUCCESS" ? data[1][0][1] : [];
        } catch (e) {
            console.error(e);
            return [];
        }
    }

    async function processTransliteration() {
        const text = editor.value;
        const cursorPos = editor.selectionStart;
        const textBeforeCursor = text.substring(0, cursorPos);
        const words = textBeforeCursor.split(/[\s\n]/); // Split by space or newline
        const lastWord = words[words.length - 2]; // Word before the space/enter just pressed

        if (!lastWord || /[\u0D00-\u0D7F]/.test(lastWord)) return; // Skip if already Malayalam

        const results = await fetchTransliteration(lastWord);
        if (results.length > 0) {
            const bestMatch = results[0];
            const start = textBeforeCursor.lastIndexOf(lastWord);
            const newText = text.substring(0, start) + bestMatch + text.substring(cursorPos - 1);
            
            editor.value = newText;
            const newPos = start + bestMatch.length + 1;
            editor.setSelectionRange(newPos, newPos);
            
            // Trigger auto-save manually since we changed value via script
            editor.dispatchEvent(new Event('input'));
        }
    }

    // Live Suggestions
    editor.addEventListener('input', async (e) => {
        const text = editor.value;
        const cursorPos = editor.selectionStart;
        const textBefore = text.substring(0, cursorPos);
        const words = textBefore.split(/[\s\n]/);
        const wordToProcess = words[words.length - 1];

        if (wordToProcess.length > 1 && !/[\u0D00-\u0D7F]/.test(wordToProcess)) {
            const suggestions = await fetchTransliteration(wordToProcess);
            renderSuggestions(suggestions, wordToProcess);
        } else {
            suggContainer.innerHTML = '';
        }
    });

    function renderSuggestions(list, original) {
        suggContainer.innerHTML = '';
        if (list.length === 0) return;
        
        list.forEach(word => {
            const chip = document.createElement('span');
            chip.className = 'suggestion-chip';
            chip.innerText = word;
            chip.onclick = () => applySuggestion(word, original);
            suggContainer.appendChild(chip);
        });
    }

    function applySuggestion(replacement, original) {
        const text = editor.value;
        const cursorPos = editor.selectionStart;
        const start = text.lastIndexOf(original, cursorPos);
        if (start !== -1) {
            const newText = text.substring(0, start) + replacement + " " + text.substring(cursorPos);
            editor.value = newText;
            editor.focus();
            const newPos = start + replacement.length + 1;
            editor.setSelectionRange(newPos, newPos);
            suggContainer.innerHTML = '';
            editor.dispatchEvent(new Event('input')); // Trigger save
        }
    }

    editor.addEventListener('keydown', (e) => {
        if (e.code === 'Space' || e.code === 'Enter') {
            setTimeout(processTransliteration, 10);
        }
    });

    // --- Toolbar Utilities ---
    function copyText() {
        if (!editor.value.trim()) return;
        editor.select();
        document.execCommand('copy');
        showStatus('Copied to clipboard!', 'check-double', 'text-primary');
        setTimeout(() => showStatus('All changes saved', 'check-circle', 'text-success'), 2000);
    }

    function downloadTxt() {
        if (!editor.value.trim()) return;
        const element = document.createElement('a');
        const file = new Blob([editor.value], {type: 'text/plain'});
        element.href = URL.createObjectURL(file);
        
        // Use first few words as filename, or default
        const note = notes.find(n => n.id === activeNoteId);
        const filename = (note.content.trim().split('\n')[0].substring(0, 15) || 'manglish_note').replace(/[^a-z0-9]/gi, '_').toLowerCase();
        
        element.download = `${filename}.txt`;
        document.body.appendChild(element);
        element.click();
        document.body.removeChild(element);
    }

    // Start App
    init();

</script>

</body>
</html>
